name: CI/CD — Build & Deploy DriveHub

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/drivehub-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/drivehub-backend

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & push Frontend image
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_MEZON_BACKEND_URL=${{ secrets.REACT_APP_MEZON_BACKEND_URL }}
            REACT_APP_MEZON_REDIRECT_URI=${{ secrets.REACT_APP_MEZON_REDIRECT_URI }}
            REACT_APP_MEZON_CLIENT_ID=${{ secrets.MEZON_CLIENT_ID }}
            REACT_APP_MEZON_AUTHORIZE_URL=${{ secrets.REACT_APP_MEZON_AUTHORIZE_URL }}
            REACT_APP_MEZON_SCOPE=openid offline
            REACT_APP_BUILD=production

  # ─────────────────────────────────────────────
  # JOB 2: Build & push Backend image
  # ─────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/node-app
          file: ./backend/node-app/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to VPS via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare VPS directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p /opt/drivehub

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/drivehub/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/drivehub

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Write production .env
            cat > .env <<'ENVEOF'
            GITHUB_REPOSITORY_LOWER=${{ github.repository_owner }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MEZON_CLIENT_ID=${{ secrets.MEZON_CLIENT_ID }}
            MEZON_CLIENT_SECRET=${{ secrets.MEZON_CLIENT_SECRET }}
            MEZON_AUTHORIZE_URL=${{ secrets.MEZON_AUTHORIZE_URL }}
            MEZON_TOKEN_URL=${{ secrets.MEZON_TOKEN_URL }}
            MEZON_USERINFO_URL=${{ secrets.MEZON_USERINFO_URL }}
            REDIRECT_URI=${{ secrets.REACT_APP_MEZON_REDIRECT_URI }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            ENVEOF

            # Pull new images
            docker compose -f docker-compose.prod.yml pull

            # Restart services (zero-downtime rolling)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            docker image prune -f
