name: CI/CD — Build & Deploy DriveHub

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/drivehub-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/drivehub-backend

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & push Frontend image
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
            REACT_APP_MEZON_REDIRECT_URI=${{ secrets.REACT_APP_MEZON_REDIRECT_URI }}
            REACT_APP_MEZON_CLIENT_ID=${{ secrets.MEZON_CLIENT_ID }}
            REACT_APP_MEZON_AUTHORIZE_URL=${{ secrets.REACT_APP_MEZON_AUTHORIZE_URL }}
            REACT_APP_MEZON_SCOPE=openid offline
            REACT_APP_BUILD=production

  # ─────────────────────────────────────────────
  # JOB 2: Build & push Backend image
  # ─────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/node-app
          file: ./backend/node-app/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to VPS via SSH
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -e
            mkdir -p /opt/drivehub
            cd /opt/drivehub

            # Write docker-compose.prod.yml
            cat > docker-compose.prod.yml << 'COMPOSEEOF'
            version: '3.9'
            services:
              frontend:
                image: ghcr.io/${{ github.repository_owner }}/drivehub-frontend:latest
                restart: unless-stopped
                ports:
                  - "8090:80"
                depends_on:
                  - backend
                networks:
                  - app_network
              backend:
                image: ghcr.io/${{ github.repository_owner }}/drivehub-backend:latest
                restart: unless-stopped
                ports:
                  - "8080:8080"
                environment:
                  - NODE_ENV=production
                  - PORT=8080
                  - JWT_SECRET=${JWT_SECRET}
                  - MEZON_CLIENT_ID=${MEZON_CLIENT_ID}
                  - MEZON_CLIENT_SECRET=${MEZON_CLIENT_SECRET}
                  - MEZON_TOKEN_URL=${MEZON_TOKEN_URL}
                  - MEZON_USERINFO_URL=${MEZON_USERINFO_URL}
                  - REACT_APP_MEZON_REDIRECT_URI=${REACT_APP_MEZON_REDIRECT_URI}
                  - REACT_APP_MEZON_AUTHORIZE_URL=${REACT_APP_MEZON_AUTHORIZE_URL}
                  - CORS_ORIGINS=${CORS_ORIGINS}
                  - DB_HOST=mysql_db
                  - DB_PORT=3306
                  - DB_DATABASE=${DB_NAME}
                  - DB_USERNAME=${DB_USER}
                  - DB_PASSWORD=${DB_PASS}
                volumes:
                  - backend_upload:/app/build/upload
                depends_on:
                  mysql_db:
                    condition: service_healthy
                networks:
                  - app_network
              mysql_db:
                image: mysql:8.0
                restart: unless-stopped
                environment:
                  - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
                  - MYSQL_DATABASE=${DB_NAME}
                  - MYSQL_USER=${DB_USER}
                  - MYSQL_PASSWORD=${DB_PASS}
                volumes:
                  - mysql_data:/var/lib/mysql
                ports:
                  - "3307:3306"
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - app_network
            volumes:
              mysql_data:
              backend_upload:
            networks:
              app_network:
                driver: bridge
            COMPOSEEOF

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Write production .env
            cat > .env << 'ENVEOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MEZON_CLIENT_ID=${{ secrets.MEZON_CLIENT_ID }}
            MEZON_CLIENT_SECRET=${{ secrets.MEZON_CLIENT_SECRET }}
            MEZON_TOKEN_URL=${{ secrets.MEZON_TOKEN_URL }}
            MEZON_USERINFO_URL=${{ secrets.MEZON_USERINFO_URL }}
            REACT_APP_MEZON_REDIRECT_URI=${{ secrets.REACT_APP_MEZON_REDIRECT_URI }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASS=${{ secrets.DB_PASS }}
            MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
            ENVEOF

            # Stop containers cũ (giải phóng ports trước khi pull)
            docker compose -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true

            # Pull và start
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d

            # Retry migration cho đến khi DB sẵn sàng (tối đa 60s)
            echo "Running migration..."
            for i in $(seq 1 12); do
              docker compose -f docker-compose.prod.yml exec -T backend \
                npx sequelize-cli db:migrate --env docker_production && break
              echo "Migration attempt $i failed, retrying in 5s..."
              sleep 5
            done
            echo "Migration done."

            # Clean up old images
            docker image prune -f
