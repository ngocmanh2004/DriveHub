version: '3.9'

services:
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/drivehub-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/drivehub-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - MEZON_CLIENT_ID=${MEZON_CLIENT_ID}
      - MEZON_CLIENT_SECRET=${MEZON_CLIENT_SECRET}
      - MEZON_TOKEN_URL=${MEZON_TOKEN_URL}
      - MEZON_USERINFO_URL=${MEZON_USERINFO_URL}
      - REACT_APP_MEZON_REDIRECT_URI=${REACT_APP_MEZON_REDIRECT_URI }
      - REACT_APP_MEZON_AUTHORIZE_URL=${REACT_APP_MEZON_AUTHORIZE_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DB_HOST=mysql_db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    depends_on:
      mysql_db:
        condition: service_healthy
    networks:
      - app_network

  mysql_db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

volumes:
  mysql_data:

networks:
  app_network:
    driver: bridge
