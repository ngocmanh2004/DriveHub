services:
  node-app:
    build:
      context: ./node-app
      dockerfile: Dockerfile
    container_name: node_app_container
    ports:
      - "8080:8080" # Mở cổng 8080 để truy cập ứng dụng
    environment:
      NODE_ENV: test
      JWT_SECRET: Khavy
      PYTHON_API_URL: https://python-app-hcmr.onrender.com
      MYSQL_HOST: mysql_db
      MYSQL_USER: root
      MYSQL_PASSWORD: 12345
      MYSQL_DATABASE: userstatus
      MYSQL_PORT: 3306
    depends_on:
      - mysql_db # Đảm bảo MySQL chạy trước node-app
    networks:
      - backend_network

  python-app:
    build:
      context: ./python-app
      dockerfile: Dockerfile
    container_name: python_app_container
    ports:
      - "8081:8081" # Map cổng Python app
    networks:
      - backend_network

  mysql_db:
    image: mysql:8.0
    container_name: mysql_container
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: userstatus # Tạo CSDL userstatus mặc định
    ports:
      - "3307:3306" # Map cổng 3307 trên host tới 3306 trong container
    volumes:
      - mysql_data:/var/lib/mysql # Lưu trữ dữ liệu trong volume
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge

volumes:
  mysql_data: